name: Android Build

on:
  push:
    branches: [main, feature/geckoview]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-free:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Build Free Debug APK
        run: |
          chmod +x gradlew-real
          ./gradlew-real assembleFreeDebug

      - name: Build Free Release APK
        run: ./gradlew-real assembleFreeRelease

      - name: Upload Free Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-free-debug
          path: app/build/outputs/apk/free/debug/app-free-debug.apk

      - name: Upload Free Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-free-release
          path: app/build/outputs/apk/free/release/app-free-release.apk

  build-gecko:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Build Gecko Debug APK
        run: |
          chmod +x gradlew-real
          ./gradlew-real assembleGeckoDebug

      - name: Build Gecko Release APK
        run: ./gradlew-real assembleGeckoRelease

      - name: Upload Gecko Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-gecko-debug
          path: |
            app/build/outputs/apk/gecko/debug/*-arm64-v8a-*.apk
            app/build/outputs/apk/gecko/debug/*-x86_64-*.apk

      - name: Upload Gecko Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-gecko-release
          path: |
            app/build/outputs/apk/gecko/release/*-arm64-v8a-*.apk
            app/build/outputs/apk/gecko/release/*-x86_64-*.apk

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/free/release/app-free-release.apk
            app/build/outputs/apk/gecko/release/*-arm64-v8a-*.apk
            app/build/outputs/apk/gecko/release/*-x86_64-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}