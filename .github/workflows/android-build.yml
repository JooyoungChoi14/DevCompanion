name: Android Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Build Free Debug APK
        run: |
          chmod +x gradlew-real
          ./gradlew-real assembleFreeDebug

      - name: Build Free Release APK
        run: ./gradlew-real assembleFreeRelease

      - name: Build Gecko Debug APK (with ABI splits)
        run: ./gradlew-real assembleGeckoDebug -PabiSplit=true

      - name: Build Gecko Release APK (with ABI splits)
        run: ./gradlew-real assembleGeckoRelease -PabiSplit=true

      - name: Upload Free Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-free-debug
          path: app/build/outputs/apk/free/debug/*.apk

      - name: Upload Free Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-free-release
          path: app/build/outputs/apk/free/release/*.apk

      - name: Upload Gecko Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-gecko-debug
          path: app/build/outputs/apk/gecko/debug/*.apk

      - name: Upload Gecko Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-gecko-release
          path: app/build/outputs/apk/gecko/release/*.apk

      - name: Upload R8 Mapping (free)
        uses: actions/upload-artifact@v4
        with:
          name: r8-mapping-free
          path: app/build/outputs/mapping/freeRelease/mapping.txt

      - name: Upload R8 Mapping (gecko)
        uses: actions/upload-artifact@v4
        with:
          name: r8-mapping-gecko
          path: app/build/outputs/mapping/geckoRelease/mapping.txt

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/free/debug/*.apk
            app/build/outputs/apk/free/release/*.apk
            app/build/outputs/apk/gecko/debug/*.apk
            app/build/outputs/apk/gecko/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}